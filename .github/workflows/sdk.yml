name: SDK

on:
  push:
    branches: [main]
    tags:
      - 'sdk-v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: SDK build + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: sdk
        run: pnpm install

      - name: Build SDK
        working-directory: sdk
        run: pnpm build

      - name: Verify dist exists
        run: |
          ls sdk/dist/
          echo "dist files: $(ls sdk/dist/ | wc -l)"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install + build SDK
        working-directory: sdk
        run: pnpm install && pnpm build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/sdk-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "@onleash/sdk v${{ steps.version.outputs.version }}"
          body: |
            Install via GitHub ref:
            ```
            pnpm add github:amalia020/onleash#${{ github.ref_name }}
            ```
            Or pin to this exact commit:
            ```
            pnpm add github:amalia020/onleash#${{ github.sha }}
            ```
          generate_release_notes: true
